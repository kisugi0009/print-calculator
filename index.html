<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紙張令數・版數・台數計算機</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #e8c97a;
    --accent2: #c9a84c;
    --text: #f0ede6;
    --muted: #aaa;
    --result-bg: #1a1a12;
    --result-border: #4a3f1a;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  /* 背景紋理 */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 39px, #1e1e1e 39px, #1e1e1e 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #1e1e1e 39px, #1e1e1e 40px);
    pointer-events: none;
    opacity: 0.4;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
    font-weight: 300;
  }

  /* 卡片 */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .section:hover {
    border-color: #3a3a3a;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .section-num {
    display: none;
  }

  .section-title {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .section-body {
    padding: 24px;
  }

  /* 輸入區 */
  .input-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #bbb;
  }

  input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(232, 201, 122, 0.08);
  }

  input[type="number"].readonly-input {
    color: var(--accent);
    border-color: var(--result-border);
    background: var(--result-bg);
    cursor: default;
  }

  /* 開數選擇 */
  .kaisu-select {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .kaisu-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .kaisu-btn:hover {
    border-color: var(--accent2);
    color: var(--accent);
  }

  .kaisu-btn.active {
    background: rgba(232, 201, 122, 0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  .kaisu-custom-wrap {
    display: flex;
    align-items: center;
    gap: 0;
    margin-top: 2px;
  }

  .kaisu-custom-wrap input[type="number"] {
    width: 80px;
    font-size: 13px;
    padding: 8px 10px;
    border-radius: 2px 0 0 2px;
    border-right: none;
  }

  .kaisu-custom-wrap input[type="number"]:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(232, 201, 122, 0.08);
    z-index: 1;
    position: relative;
  }

  .kaisu-custom-label {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 0 2px 2px 0;
    color: var(--muted);
    white-space: nowrap;
  }

  /* 結果 */
  .result-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: var(--result-bg);
    border: 1px solid var(--result-border);
    border-radius: 2px;
  }

  .result-label {
    font-size: 13px;
    letter-spacing: 0.06em;
    color: #bbb;
    white-space: nowrap;
  }

  .result-value {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: var(--accent);
    flex: 1;
    text-align: right;
  }

  .result-unit {
    font-size: 13px;
    color: var(--accent2);
    font-weight: 400;
    margin-left: 4px;
  }

  /* 版費子欄位 */
  .banfei-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .banfei-result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .result-mini {
    padding: 12px 16px;
    background: var(--result-bg);
    border: 1px solid var(--result-border);
    border-radius: 2px;
  }

  .result-mini-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .result-mini-value {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    color: var(--accent);
  }

  .hint {
    font-size: 12px;
    color: #666;
    margin-top: 10px;
    font-style: italic;
  }

  /* 分隔線 */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* 開數對照 */
  .reference-table {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .ref-item {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 4px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--muted);
  }

  .ref-item span {
    color: var(--text);
    margin-left: 4px;
  }

  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 11px;
    color: #444;
    letter-spacing: 0.1em;
  }

  @media (max-width: 480px) {
    h1 { font-size: 22px; }
    .banfei-grid, .banfei-result-grid { grid-template-columns: 1fr; }
    .input-grid { grid-template-columns: 1fr; }
    .section-body { padding: 16px; }
    .section-header { padding: 14px 16px; }
    .result-value { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-tag">Print Calculator</div>
    <h1>紙張令數・版數・台數<span>計算機</span></h1>
  </header>

  <!-- 紙張令數 -->
  <div class="section">
    <div class="section-header">
      <span class="section-num">01</span>
      <span class="section-title">紙張令數（不含放損）</span>
    </div>
    <div class="section-body">
      <div class="input-grid">
        <div class="field">
          <label>頁數</label>
          <input type="number" id="p1-pages" value="102" min="1" oninput="calcPaper()">
        </div>
        <div class="field">
          <label>份 / 本數</label>
          <input type="number" id="p1-copies" value="500" min="1" oninput="calcPaper()">
        </div>
        <div class="field">
          <label>開數</label>
          <div class="kaisu-select" id="p1-kaisu-btns">
            <button class="kaisu-btn" onclick="setKaisu('p1', 4)">4開</button>
            <button class="kaisu-btn active" onclick="setKaisu('p1', 8)">8開</button>
            <button class="kaisu-btn" onclick="setKaisu('p1', 16)">16開</button>
            <button class="kaisu-btn" onclick="setKaisu('p1', 32)">32開</button>
          </div>
          <div class="kaisu-custom-wrap">
            <input type="number" id="p1-custom-kaisu" min="1" placeholder="自訂" oninput="setKaisuCustom('p1')">
            <span class="kaisu-custom-label">開</span>
          </div>
          <input type="hidden" id="p1-kaisu" value="8">
        </div>
      </div>
      <div class="result-row">
        <span class="result-label">所需令數</span>
        <span class="result-value" id="p1-result">—<span class="result-unit">令</span></span>
      </div>
      <hr class="divider">
      <div class="field" style="margin-bottom:16px;">
        <label>放損張數</label>
        <div class="kaisu-custom-wrap">
          <input type="number" id="p1-loss" min="0" placeholder="填入放損張數" oninput="calcPaper()" style="width:100%;">
          <span class="kaisu-custom-label">張</span>
        </div>
        <p class="hint" style="margin-top:6px;">放損數量依印刷廠為準，1令 = 500張</p>
      </div>
      <div class="result-row" id="p1-total-row" style="opacity:0.4;">
        <span class="result-label">含放損合計</span>
        <span class="result-value" id="p1-total">—<span class="result-unit">令</span></span>
      </div>
      <p class="hint">公式：(頁數 ÷ 2 × 份數) ÷ (開數 × 500)</p>
    </div>
  </div>

  <!-- 版數 -->
  <div class="section">
    <div class="section-header">
      <span class="section-num">02</span>
      <span class="section-title">版數計算</span>
    </div>
    <div class="section-body">
      <div class="banfei-grid">
        <div class="field">
          <label>頁數</label>
          <input type="number" id="p2-pages" value="102" min="1" oninput="calcBan()">
        </div>
        <div class="field">
          <label>開數</label>
          <div class="kaisu-select" id="p2-kaisu-btns">
            <button class="kaisu-btn" onclick="setKaisu('p2', 4)">4開</button>
            <button class="kaisu-btn active" onclick="setKaisu('p2', 8)">8開</button>
            <button class="kaisu-btn" onclick="setKaisu('p2', 16)">16開</button>
            <button class="kaisu-btn" onclick="setKaisu('p2', 32)">32開</button>
          </div>
          <div class="kaisu-custom-wrap">
            <input type="number" id="p2-custom-kaisu" min="1" placeholder="自訂" oninput="setKaisuCustom('p2')">
            <span class="kaisu-custom-label">開</span>
          </div>
          <input type="hidden" id="p2-kaisu" value="8">
        </div>
      </div>
      <div class="banfei-result-grid">
        <div class="result-mini">
          <div class="result-mini-label">黑白版數</div>
          <div class="result-mini-value" id="p2-bw">—<small style="font-size:13px;color:#666;margin-left:4px;">塊</small></div>
        </div>
        <div class="result-mini">
          <div class="result-mini-label">四色版數</div>
          <div class="result-mini-value" id="p2-color">—<small style="font-size:13px;color:#666;margin-left:4px;">塊</small></div>
        </div>
      </div>
      <hr class="divider">
      <div class="banfei-grid">
        <div class="field">
          <label>版單價（塊）</label>
          <input type="number" id="p2-price" value="225" min="0" oninput="calcBan()">
        </div>
        <div class="field">
          <label>使用版數</label>
          <div class="kaisu-select" id="p2-ban-type-btns">
            <button class="kaisu-btn" id="p2-btn-bw" onclick="setBanType('bw')">黑白</button>
            <button class="kaisu-btn" id="p2-btn-color" onclick="setBanType('color')">彩色</button>
          </div>
          <div class="kaisu-custom-wrap">
            <input type="number" id="p2-custom-ban" min="0" placeholder="或手動輸入" oninput="clearBanType(); calcBan();">
            <span class="kaisu-custom-label">塊</span>
          </div>
        </div>
      </div>
      <div class="result-row">
        <span class="result-label">合計版費</span>
        <span class="result-value" id="p2-total">—<span class="result-unit">元</span></span>
      </div>
      <p class="hint">公式：黑白版 = ROUNDUP(頁數 ÷ 開數)；四色版 = 黑白版 × 4</p>
    </div>
  </div>

  <!-- 台數 -->
  <div class="section">
    <div class="section-header">
      <span class="section-num">03</span>
      <span class="section-title">台數計算</span>
    </div>
    <div class="section-body">
      <div class="input-grid">
        <div class="field">
          <label>頁數</label>
          <input type="number" id="p3-pages" value="146" min="1" oninput="calcTai()">
        </div>
        <div class="field">
          <label>開數</label>
          <div class="kaisu-select" id="p3-kaisu-btns">
            <button class="kaisu-btn" onclick="setKaisu('p3', 4)">4開</button>
            <button class="kaisu-btn active" onclick="setKaisu('p3', 8)">8開</button>
            <button class="kaisu-btn" onclick="setKaisu('p3', 16)">16開</button>
            <button class="kaisu-btn" onclick="setKaisu('p3', 32)">32開</button>
          </div>
          <div class="kaisu-custom-wrap">
            <input type="number" id="p3-custom-kaisu" min="1" placeholder="自訂" oninput="setKaisuCustom('p3')">
            <span class="kaisu-custom-label">開</span>
          </div>
          <input type="hidden" id="p3-kaisu" value="8">
        </div>
      </div>
      <div class="result-row">
        <span class="result-label">台數</span>
        <span class="result-value" id="p3-result">—<span class="result-unit">台</span></span>
      </div>
      <p class="hint">公式：頁數 ÷ 開數</p>
    </div>
  </div>

  <!-- 開數對照 -->
  <div class="section">
    <div class="section-header">
      <span class="section-num">04</span>
      <span class="section-title">開數對照</span>
    </div>
    <div class="section-body">
      <div class="reference-table">
        <div class="ref-item">A3 <span>= 4開</span></div>
        <div class="ref-item">A4 <span>= 8開</span></div>
        <div class="ref-item">A5 <span>= 16開</span></div>
        <div class="ref-item">A6 <span>= 32開</span></div>
      </div>
    </div>
  </div>

  <footer>印刷計算機 — 依據 Excel 邏輯建置</footer>
</div>

<script>
  function setKaisu(prefix, val) {
    document.getElementById(prefix + '-kaisu').value = val;
    document.getElementById(prefix + '-custom-kaisu').value = '';
    document.querySelectorAll(`#${prefix}-kaisu-btns .kaisu-btn`).forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.textContent) === val);
    });
    if (prefix === 'p1') calcPaper();
    if (prefix === 'p2') calcBan();
    if (prefix === 'p3') calcTai();
  }

  function setKaisuCustom(prefix) {
    const val = parseFloat(document.getElementById(prefix + '-custom-kaisu').value);
    if (val && val > 0) {
      document.getElementById(prefix + '-kaisu').value = val;
      document.querySelectorAll(`#${prefix}-kaisu-btns .kaisu-btn`).forEach(btn => btn.classList.remove('active'));
    }
    if (prefix === 'p1') calcPaper();
    if (prefix === 'p2') calcBan();
    if (prefix === 'p3') calcTai();
  }

  function fmt(n, decimals = 3) {
    return n.toFixed(decimals);
  }

  function calcPaper() {
    const pages = parseFloat(document.getElementById('p1-pages').value) || 0;
    const copies = parseFloat(document.getElementById('p1-copies').value) || 0;
    const kaisu = parseFloat(document.getElementById('p1-kaisu').value) || 8;
    const loss = document.getElementById('p1-loss').value;

    const result = ((pages / 2) * copies) / (kaisu * 500);
    document.getElementById('p1-result').innerHTML = `${fmt(result)}<span class="result-unit">令</span>`;

    const totalRow = document.getElementById('p1-total-row');
    if (loss !== '') {
      const total = result + parseFloat(loss) / 500;
      document.getElementById('p1-total').innerHTML = `${fmt(total)}<span class="result-unit">令</span>`;
      totalRow.style.opacity = '1';
    } else {
      document.getElementById('p1-total').innerHTML = `—<span class="result-unit">令</span>`;
      totalRow.style.opacity = '0.4';
    }
  }

  let p2BanType = null; // 'bw' | 'color' | null

  function setBanType(type) {
    p2BanType = type;
    document.getElementById('p2-btn-bw').classList.toggle('active', type === 'bw');
    document.getElementById('p2-btn-color').classList.toggle('active', type === 'color');
    document.getElementById('p2-custom-ban').value = '';
    calcBan();
  }

  function clearBanType() {
    p2BanType = null;
    document.getElementById('p2-btn-bw').classList.remove('active');
    document.getElementById('p2-btn-color').classList.remove('active');
  }

  function calcBan() {
    const pages = parseFloat(document.getElementById('p2-pages').value) || 0;
    const kaisu = parseFloat(document.getElementById('p2-kaisu').value) || 8;
    const price = parseFloat(document.getElementById('p2-price').value) || 0;

    const bw = Math.ceil(pages / kaisu);
    const color = bw * 4;

    document.getElementById('p2-bw').innerHTML = `${bw}<small style="font-size:13px;color:#666;margin-left:4px;">塊</small>`;
    document.getElementById('p2-color').innerHTML = `${color}<small style="font-size:13px;color:#666;margin-left:4px;">塊</small>`;

    let useBan = null;
    if (p2BanType === 'bw') useBan = bw;
    else if (p2BanType === 'color') useBan = color;
    else {
      const custom = document.getElementById('p2-custom-ban').value;
      useBan = custom !== '' ? parseFloat(custom) : null;
    }

    const el = document.getElementById('p2-total');
    if (useBan === null || isNaN(useBan)) {
      el.innerHTML = `—<span class="result-unit">元</span>`;
    } else {
      el.innerHTML = `${(price * useBan).toLocaleString()}<span class="result-unit">元</span>`;
    }
  }

  function calcTai() {
    const pages = parseFloat(document.getElementById('p3-pages').value) || 0;
    const kaisu = parseFloat(document.getElementById('p3-kaisu').value) || 8;
    const result = pages / kaisu;
    const el = document.getElementById('p3-result');
    el.innerHTML = `${fmt(result, 2)}<span class="result-unit">台</span>`;
  }

  // 初始計算
  calcPaper(); calcBan(); calcTai();
</script>
</body>
</html>
